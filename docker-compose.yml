services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: redtetris
      POSTGRES_PASSWORD: redtetris
      POSTGRES_DB: redtetris
    volumes:
      - redtetris_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U redtetris -d redtetris']
      interval: 2s
      timeout: 5s
      retries: 15

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migration
    environment:
      PGHOST: postgres
      PGUSER: redtetris
      PGPASSWORD: redtetris
      PGDATABASE: redtetris
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://redtetris:redtetris@postgres:5432/redtetris
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  redtetris_pgdata:
    name: redtetris_pgdata
