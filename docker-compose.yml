services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://redtetris:redtetris@postgres:5432/redtetris
    networks:
      - redtetris

networks:
  redtetris:
    external: true
    name: redtetris_net
