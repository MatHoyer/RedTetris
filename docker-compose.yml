services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: redtetris
      POSTGRES_PASSWORD: redtetris
      POSTGRES_DB: redtetris
    volumes:
      - redtetris_pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U redtetris -d redtetris']
      interval: 2s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://redtetris:redtetris@postgres:5432/redtetris
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  redtetris_pgdata:
    name: redtetris_pgdata
